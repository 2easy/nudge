# Release with artifact attestations: pushing a bare version tag (e.g. 0.6.0,
# as created by `npm version`) builds the plugin from source, signs SLSA
# build provenance for the assets, and publishes the GitHub release. Do not
# create releases locally — this workflow owns them. Verify an asset with:
#   gh attestation verify <file> --repo 2easy/nudge
name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write # create the release
  id-token: write # sign the attestation
  attestations: write # store the attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm

      - name: Build plugin
        run: |
          npm ci
          npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" main.js manifest.json styles.css \
            --title "$GITHUB_REF_NAME" --generate-notes --verify-tag
